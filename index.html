<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>

<style>
body { font-family: Arial; padding: 15px; }

.row {
    display: flex;
    gap: 10px;
}

.col {
    flex: 1;
}

button {
    padding: 12px;
    margin: 5px 0;
    width: 100%;
}

textarea, select, input {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}

textarea {
    height: 300px;
}

#topic {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>📚 Study Tracker</h2>

<!-- 🔥 업로드 + 카테고리 가로 배치 -->
<div class="row">

    <div class="col">
        <h3>CSV 업로드</h3>
        <input type="file" id="fileInput">
        <button onclick="uploadCSV()">업로드</button>
    </div>

    <div class="col">
        <h3>카테고리 선택</h3>
        <select id="category"></select>
    </div>

</div>

<button onclick="pickRandom()">🎯 랜덤 주제 선택 + 타이머</button>

<h2 id="topic">주제를 선택하세요</h2>
<h1 id="timer">30:00</h1>

<h3>답안 작성</h3>
<p>👉 키보드 🎤 버튼 사용 가능</p>
<textarea id="content"></textarea>

<button onclick="saveAttempt()">저장</button>

<h3>이전 기록</h3>
<div id="history"></div>

<script>
const API = "https://study-partner-k4oc.onrender.com/";

let currentTopicId = null;
let timerInterval = null;

// =========================
// CSV 업로드 (에러 표시 포함)
// =========================
async function uploadCSV() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("파일 선택하세요");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch(API + "/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.error) {
            alert("❌ 업로드 실패: " + data.error);
        } else {
            alert(`✅ 업로드 완료 (${data.count}개 주제)`);
            loadCategories();
        }

    } catch (err) {
        alert("❌ 서버 연결 실패");
        console.error(err);
    }
}

// =========================
// 카테고리 로드
// =========================
async function loadCategories() {
    const res = await fetch(API + "/categories");
    const data = await res.json();

    const select = document.getElementById("category");
    select.innerHTML = "";

    data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.text = c;
        select.appendChild(opt);
    });
}

// =========================
// 랜덤 주제 + 타이머
// =========================
async function pickRandom() {
    const category = document.getElementById("category").value;

    const res = await fetch(API + "/random/" + category);
    const data = await res.json();

    if (data.error) {
        alert("주제가 없습니다");
        return;
    }

    currentTopicId = data.id;
    document.getElementById("topic").innerText = data.title;

    startTimer(1800);
    loadAttempts();
}

// =========================
// 타이머
// =========================
function startTimer(seconds) {
    clearInterval(timerInterval);

    let remaining = seconds;

    timerInterval = setInterval(() => {
        const min = String(Math.floor(remaining / 60)).padStart(2, '0');
        const sec = String(remaining % 60).padStart(2, '0');

        document.getElementById("timer").innerText = `${min}:${sec}`;

        remaining--;

        if (remaining < 0) {
            clearInterval(timerInterval);
            alert("⏰ 시간 종료!");
        }
    }, 1000);
}

// =========================
// 저장
// =========================
async function saveAttempt() {
    const content = document.getElementById("content").value;

    if (!currentTopicId) {
        alert("먼저 주제를 선택하세요");
        return;
    }

    await fetch(API + "/attempts", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            topic_id: currentTopicId,
            content: content
        })
    });

    alert("저장 완료!");
    loadAttempts();
}

// =========================
// 이전 기록
// =========================
async function loadAttempts() {
    const res = await fetch(API + "/attempts/" + currentTopicId);
    const data = await res.json();

    const div = document.getElementById("history");
    div.innerHTML = "";

    data.forEach(a => {
        const p = document.createElement("p");
        p.innerText = a[0] + " (" + a[1] + ")";
        div.appendChild(p);
    });
}

loadCategories();
</script>

</body>
</html>
